<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilipekOS v6.2 | Cloud Fix</title>
    <style>
        :root { --yellow: #FFD700; --blue: #0056b3; --dark: #121212; --hacker: #00ff41; --julek: #ff4444; }
        body { margin: 0; background: var(--yellow); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1000; padding-top: 20px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar div.nav-item { display: block; padding: 15px 25px; color: white; border-bottom: 1px solid #333; font-size: 18px; cursor: pointer; }
        .admin-link { background: var(--julek); font-weight: bold; }
        .top-bar { background: var(--blue); color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; margin-right: 15px; }
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; height: calc(100vh - 100px); overflow-y: auto; width: 100%; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; border-top: 10px solid var(--blue); margin-bottom: 20px; box-sizing: border-box; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; }
        .grid-item { background: #f8f9fa; padding: 20px; border-radius: 18px; font-weight: bold; color: var(--blue); border: 2px solid #eee; text-align: center; cursor: pointer; }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; box-sizing: border-box; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; }
        .btn-act { background: var(--blue); color: white; font-weight: bold; padding: 15px; border: none; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        .mic-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--blue); border-radius: 50%; border: 5px solid white; color: white; font-size: 30px; z-index: 1100; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-item admin-link" onclick="move('julek')">🛡️ ADMIN</div>
        <div class="nav-item" onclick="move('home')">🏠 Start</div>
        <div class="nav-item" onclick="move('apps')">🚀 Gry</div>
        <div class="nav-item" onclick="move('yt')">📺 YT</div>
        <div class="nav-item" onclick="move('kod')">📖 Pamiętnik</div>
    </div>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <b>FilipekOS v6.2</b>
    </div>

    <div id="main" class="content">
        <div class="card"><h1>Ładowanie... ☁️</h1></div>
    </div>

    <button class="mic-btn" onclick="startVoice()">🎤</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAqUxJwhPUjpr0PeCCcKUtohCEDAfeopk",
            authDomain: "filipek-site.firebaseapp.com",
            // SPRAWDŹ TEN LINK W KONSOLI FIREBASE!
            databaseURL: "https://filipek-site-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "filipek-site",
            storageBucket: "filipek-site.firebasestorage.app",
            messagingSenderId: "780672431490",
            appId: "1:780672431490:web:f896fa960bfa6efafe0b9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentApps = [];

        // Pobieranie apek
        onValue(ref(db, 'apps'), (snap) => {
            const data = snap.val();
            currentApps = data ? Object.values(data) : [];
            if(window.currentPage === 'apps') renderApps();
        });

        window.move = function(p) {
            window.currentPage = p;
            const m = document.getElementById('main');
            document.getElementById('sidebar').classList.remove('active');

            if(p === 'home') m.innerHTML = `<div class="card"><h1>Start 🏠</h1><p>Wszystko gotowe!</p></div>`;
            
            if(p === 'apps') renderApps();

            if(p === 'yt') {
                m.innerHTML = `<div class="card"><h1>YouTuberzy 📺</h1><div class="app-grid">
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Wojan')">Wojan</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Palion')">Palion</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@WerkaAferka')">Werka</div>
                </div></div>`;
            }

            if(p === 'kod') {
                if(prompt("Kod:") !== "5522") return;
                onValue(ref(db, 'pamietnik'), (snap) => {
                    m.innerHTML = `<div class="card"><h1>📖 Pamiętnik</h1>
                        <textarea id="txt-data" rows="10">${snap.val() || ""}</textarea>
                        <button class="btn-act" onclick="saveCloud()">ZAPISZ</button></div>`;
                }, {onlyOnce: true});
            }

            if(p === 'julek') {
                if(prompt("Admin:") !== "2907") return;
                m.innerHTML = `<div class="card"><h1>Panel Admina</h1>
                    <input type="text" id="app-n" placeholder="Nazwa">
                    <input type="text" id="app-i" placeholder="ID (com...)">
                    <button class="btn-act" onclick="addCloud()">DODAJ APKE</button>
                    <button class="btn-act" style="background:#333" onclick="clearCloud()">USUŃ WSZYSTKO</button>
                </div>`;
            }
        };

        window.addCloud = () => {
            const n = document.getElementById('app-n').value;
            const i = document.getElementById('app-i').value;
            if(n && i) {
                push(ref(db, 'apps'), { name: n, id: i })
                .then(() => alert("Dodano!"))
                .catch(e => alert("Błąd: " + e.message));
            }
        };

        window.saveCloud = () => {
            const val = document.getElementById('txt-data').value;
            set(ref(db, 'pamietnik'), val).then(() => alert("Zapisano!"));
        };

        window.clearCloud = () => {
            if(confirm("Czyścić?")) remove(ref(db, 'apps'));
        };

        function renderApps() {
            const m = document.getElementById('main');
            let h = `<div class="card"><h1>Gry 🎮</h1><div class="app-grid">`;
            currentApps.forEach(a => {
                h += `<div class="grid-item" onclick="window.location.href='intent://#Intent;scheme=android-app;package=${a.id};end'">${a.name}</div>`;
            });
            m.innerHTML = h + `</div></div>`;
        }

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');
        
        window.startVoice = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return;
            const rec = new Speech(); rec.lang = 'pl-PL';
            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                let f = currentApps.find(a => cmd.includes(a.name.toLowerCase()));
                if(f) window.location.href = `intent://#Intent;scheme=android-app;package=${f.id};end`;
            };
            rec.start();
        };

        move('home');
    </script>
</body>
</html>
