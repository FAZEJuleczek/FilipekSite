<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilipekOS v7.0 | Offline Pro</title>
    <style>
        :root { --yellow: #FFD700; --blue: #0056b3; --dark: #121212; --hacker: #00ff41; --julek: #ff4444; }
        body { margin: 0; background: var(--yellow); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1000; padding-top: 20px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar div.nav-item { display: block; padding: 15px 25px; color: white; border-bottom: 1px solid #333; font-size: 18px; cursor: pointer; }
        .admin-link { background: var(--julek); font-weight: bold; }
        .top-bar { background: var(--blue); color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; margin-right: 15px; }
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; height: calc(100vh - 100px); overflow-y: auto; width: 100%; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; border-top: 10px solid var(--blue); margin-bottom: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; }
        .grid-item { background: #f8f9fa; padding: 20px; border-radius: 18px; font-weight: bold; color: var(--blue); border: 2px solid #eee; text-align: center; cursor: pointer; }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; box-sizing: border-box; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; }
        .btn-act { background: var(--blue); color: white; font-weight: bold; padding: 15px; border: none; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        .hacker-box { background: #000; color: var(--hacker); padding: 10px; border-radius: 10px; font-family: monospace; font-size: 10px; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-item admin-link" onclick="move('julek')">🛡️ ADMIN</div>
        <div class="nav-item" onclick="move('home')">🏠 Start</div>
        <div class="nav-item" onclick="move('apps')">🚀 Gry</div>
        <div class="nav-item" onclick="move('yt')">📺 YouTuberzy</div>
        <div class="nav-item" onclick="move('kod')">📖 Pamiętnik</div>
    </div>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <b>FilipekOS v7.0</b>
    </div>

    <div id="main" class="content">
        <div class="card"><h1>System Gotowy! 🚀</h1><p>Wybierz opcję z menu.</p></div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function move(p) {
            const m = document.getElementById('main');
            document.getElementById('sidebar').classList.remove('active');

            if(p === 'home') m.innerHTML = `<div class="card"><h1>Witaj Filipku! 👋</h1><p>Miłego dnia!</p></div>`;

            if(p === 'apps') {
                let apps = JSON.parse(localStorage.getItem('apps') || "[]");
                let h = `<div class="card"><h1>Twoje Gry 🎮</h1><div class="grid">`;
                apps.forEach(a => {
                    h += `<div class="grid-item" onclick="window.location.href='intent://#Intent;scheme=android-app;package=${a.id};end'">🚀<br>${a.name}</div>`;
                });
                if(apps.length === 0) h += `<p style="grid-column:1/3">Brak gier. Poproś Julka!</p>`;
                m.innerHTML = h + `</div></div>`;
            }

            if(p === 'yt') {
                m.innerHTML = `<div class="card"><h1>YouTuberzy 📺</h1><div class="grid">
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Wojan')">🧊 Wojan</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Palion')">🔥 Palion</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@WerkaAferka')">💅 Werka</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Rembol')">🎒 Rembol</div>
                </div></div>`;
            }

            if(p === 'kod') {
                if(prompt("Kod:") !== "5522") return;
                let data = localStorage.getItem('pamietnik') || "";
                m.innerHTML = `<div class="card"><h1>📖 Pamiętnik</h1>
                    <textarea id="p-data" rows="10" placeholder="Twoje sekrety...">${data}</textarea>
                    <button class="btn-act" onclick="saveP()">ZAPISZ</button></div>`;
            }

            if(p === 'julek') {
                if(prompt("Admin:") !== "2907") return;
                let currentData = localStorage.getItem('apps') || "[]";
                m.innerHTML = `<div class="card" style="border-top-color:var(--julek)">
                    <h1 style="color:var(--julek)">ADMIN PANEL</h1>
                    <input type="text" id="an" placeholder="Nazwa Gry">
                    <input type="text" id="ai" placeholder="ID (com.package)">
                    <button class="btn-act" style="background:var(--julek)" onclick="addA()">DODAJ GRĘ</button>
                    <hr>
                    <p style="font-size:12px;">KOD SYNC (Skopiuj to do Filipa):</p>
                    <div class="hacker-box" id="sync-box">${currentData}</div>
                    <button class="btn-act" style="background:#333" onclick="importA()">IMPORTUJ KOD SYNC</button>
                    <button class="btn-act" style="background:#555" onclick="clearA()">USUŃ WSZYSTKO</button>
                </div>`;
            }
        }

        function addA() {
            const n = document.getElementById('an').value;
            const i = document.getElementById('ai').value;
            if(!n || !i) return;
            let apps = JSON.parse(localStorage.getItem('apps') || "[]");
            apps.push({name: n, id: i});
            localStorage.setItem('apps', JSON.stringify(apps));
            alert("Dodano lokalnie!");
            move('julek');
        }

        function importA() {
            let val = prompt("Wklej tutaj kod SYNC od Julka:");
            if(val) {
                localStorage.setItem('apps', val);
                alert("Zsynchronizowano!");
                move('apps');
            }
        }

        function saveP() {
            localStorage.setItem('pamietnik', document.getElementById('p-data').value);
            alert("Zapisano!");
        }

        function clearA() {
            if(confirm("Czyścić?")) { localStorage.removeItem('apps'); move('julek'); }
        }

        move('home');
    </script>
</body>
</html>
