<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilipekOS v6.1 | Fix</title>
    <style>
        :root { --yellow: #FFD700; --blue: #0056b3; --dark: #121212; --hacker: #00ff41; --julek: #ff4444; }
        body { margin: 0; background: var(--yellow); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1000; padding-top: 20px; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar div.nav-item { display: block; padding: 15px 25px; color: white; border-bottom: 1px solid #333; font-size: 18px; cursor: pointer; }
        .admin-link { background: var(--julek); font-weight: bold; }
        .top-bar { background: var(--blue); color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; margin-right: 15px; }
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; height: calc(100vh - 100px); overflow-y: auto; width: 100%; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; border-top: 10px solid var(--blue); margin-bottom: 20px; box-sizing: border-box; }
        .app-grid, .yt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; }
        .grid-item { background: #f8f9fa; padding: 20px; border-radius: 18px; font-weight: bold; color: var(--blue); border: 2px solid #eee; text-align: center; cursor: pointer; }
        .grid-item:active { transform: scale(0.9); background: #eee; }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; box-sizing: border-box; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; }
        .btn-act { background: var(--blue); color: white; font-weight: bold; padding: 15px; border: none; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        .mic-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--blue); border-radius: 50%; border: 5px solid white; color: white; font-size: 30px; z-index: 1100; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        #status { position: fixed; bottom: 110px; right: 30px; background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 15px; display: none; z-index: 1100; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-item admin-link" onclick="window.move('julek')">🛡️ PANEL ADMINA</div>
        <div class="nav-item" onclick="window.move('home')">🏠 Start</div>
        <div class="nav-item" onclick="window.move('apps')">🚀 Gry i Apki</div>
        <div class="nav-item" onclick="window.move('yt')">📺 YouTuberzy</div>
        <div class="nav-item" onclick="window.move('kod')">📖 Pamiętnik</div>
    </div>

    <div class="top-bar">
        <button class="menu-btn" onclick="window.toggle()">☰</button>
        <b id="header-title">FilipekOS v6.1 Cloud</b>
    </div>

    <div id="main" class="content">
        <div class="card"><h1>Łączenie z Firebase... ☁️</h1></div>
    </div>

    <div id="status">Słucham...</div>
    <button class="mic-btn" onclick="window.startVoice()">🎤</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAqUxJwhPUjpr0PeCCcKUtohCEDAfeopk",
            authDomain: "filipek-site.firebaseapp.com",
            databaseURL: "https://filipek-site-default-rtdb.firebaseio.com", // Zmienione na domyślny format
            projectId: "filipek-site",
            storageBucket: "filipek-site.firebasestorage.app",
            messagingSenderId: "780672431490",
            appId: "1:780672431490:web:f896fa960bfa6efafe0b9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentApps = [];
        window.currentPage = 'home';

        // Nasłuchiwanie zmian w apkach
        onValue(ref(db, 'apps'), (snapshot) => {
            const data = snapshot.val();
            currentApps = data ? Object.entries(data).map(([key, value]) => ({...value, firebaseKey: key})) : [];
            if(window.currentPage === 'apps') renderApps();
        });

        function move(p) {
            window.currentPage = p;
            const m = document.getElementById('main');
            document.getElementById('sidebar').classList.remove('active');

            if(p === 'home') {
                m.innerHTML = `<div class="card"><h1>Cześć Filipek! 👋</h1><p>Wszystko działa. Wybierz opcję z menu!</p></div>`;
            }

            if(p === 'apps') renderApps();

            if(p === 'yt') {
                m.innerHTML = `<div class="card"><h1>YouTuberzy 📺</h1><div class="yt-grid">
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Wojan')">🧊 Wojan</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Palion')">🔥 Palion</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@WerkaAferka')">💅 Werka</div>
                    <div class="grid-item" onclick="window.open('https://youtube.com/@Rembol')">🎒 Rembol</div>
                </div></div>`;
            }

            if(p === 'kod') {
                let pass = prompt("Podaj kod do Pamiętnika:");
                if(pass !== "5522") return alert("Zły kod!");
                onValue(ref(db, 'pamietnik'), (snap) => {
                    m.innerHTML = `<div class="card" style="border-top-color:var(--hacker)">
                        <h1>📖 Twój Pamiętnik</h1>
                        <textarea id="inp-cloud" rows="10" placeholder="Pisz tutaj...">${snap.val() || ""}</textarea>
                        <button class="btn-act" style="background:var(--hacker); color:black" id="btn-save-cloud">ZAPISZ SEKRETY</button>
                    </div>`;
                    document.getElementById('btn-save-cloud').onclick = () => {
                        set(ref(db, 'pamietnik'), document.getElementById('inp-cloud').value);
                        alert("Zapisano w chmurze!");
                    };
                }, {onlyOnce: true});
            }

            if(p === 'julek') {
                let pass = prompt("Kod Admina:");
                if(pass !== "2907") return alert("Brak dostępu!");
                m.innerHTML = `<div class="card" style="border-top-color:var(--julek)">
                    <h1 style="color:var(--julek)">ADMIN PANEL</h1>
                    <input type="text" id="app-name" placeholder="Nazwa Gry">
                    <input type="text" id="app-id" placeholder="ID (np. com.mojang...)">
                    <button class="btn-act" style="background:var(--julek)" id="btn-add-cloud">DODAJ APKE</button>
                    <hr style="margin:20px 0;">
                    <button class="btn-act" style="background:#333" id="btn-reset-cloud">USUŃ WSZYSTKIE APKI</button>
                </div>`;
                
                document.getElementById('btn-add-cloud').onclick = () => {
                    const n = document.getElementById('app-name').value;
                    const i = document.getElementById('app-id').value;
                    if(n && i) {
                        push(ref(db, 'apps'), { name: n, id: i });
                        alert("Dodano!");
                        document.getElementById('app-name').value = "";
                        document.getElementById('app-id').value = "";
                    }
                };

                document.getElementById('btn-reset-cloud').onclick = () => {
                    if(confirm("Czy na pewno usunąć wszystkie gry z chmury?")) {
                        remove(ref(db, 'apps'));
                        alert("Wyczyszczono!");
                    }
                };
            }
        }

        function renderApps() {
            const m = document.getElementById('main');
            let html = `<div class="card"><h1>Twoje Gry 🎮</h1><div class="app-grid">`;
            currentApps.forEach(app => {
                html += `<div class="grid-item" onclick="window.location.href='intent://#Intent;scheme=android-app;package=${app.id};end'">🚀<br>${app.name}</div>`;
            });
            if(currentApps.length === 0) html += `<p style="grid-column:1/3">Brak gier w chmurze.</p>`;
            html += `</div></div>`;
            m.innerHTML = html;
        }

        // Ekspozycja funkcji do okna
        window.move = move;
        window.toggle = () => document.getElementById('sidebar').classList.toggle('active');
        window.startVoice = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Brak obsługi głosu.");
            const rec = new Speech(); rec.lang = 'pl-PL';
            const st = document.getElementById('status');
            rec.onstart = () => { st.style.display="block"; st.innerText="Słucham..."; };
            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                let found = currentApps.find(a => cmd.includes(a.name.toLowerCase()));
                if(found) window.location.href = `intent://#Intent;scheme=android-app;package=${found.id};end`;
                else alert("Nie znaleziono: " + cmd);
                st.style.display="none";
            };
            rec.onerror = () => st.style.display="none";
            rec.start();
        };

        move('home');
    </script>
</body>
</html>
