<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilipekSite | Home</title>
    <style>
        :root { --yellow: #FFD700; --blue: #0056b3; --dark: #121212; }
        body { margin: 0; background: var(--yellow); font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* UI ELEMENTY */
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1000; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; border-bottom: 1px solid #333; }
        
        .top-bar { background: var(--blue); color: white; padding: 15px; display: flex; align-items: center; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        .content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--blue); }

        /* MIKROFON */
        .mic-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: var(--blue); border-radius: 50%; border: 4px solid white; color: white; font-size: 30px; cursor: pointer; z-index: 1100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #status { position: fixed; bottom: 110px; right: 30px; background: var(--dark); color: white; padding: 10px; border-radius: 10px; display: none; font-size: 14px; }
        
        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 12px; font-weight: bold; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <a href="#" onclick="move('home')">🏠 Home</a>
        <a href="#" onclick="move('yt')">📺 YouTuberzy</a>
        <a href="#" onclick="move('spotify')">🎵 Spotify</a>
    </div>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggle()">☰</button>
        <b style="font-size: 20px;">FilipekSite</b>
    </div>

    <div class="content" id="main">
        <div class="card">
            <h1>Cześć Filipek! 🚀</h1>
            <p>Kliknij menu lub mikrofon, żeby zacząć zabawę!</p>
        </div>
    </div>

    <div id="status">Słucham...</div>
    <button class="mic-btn" id="go-mic">🎤</button>

    <div class="footer">Pamiętaj Filipku Julek Cię bardzo kocha</div>

    <script>
        function toggle() { document.getElementById('sidebar').classList.toggle('active'); }
        
        function move(p) {
            const m = document.getElementById('main');
            toggle();
            if(p==='home') m.innerHTML = '<div class="card"><h1>Cześć! 👋</h1><p>Witaj w domu.</p></div>';
            if(p==='yt') m.innerHTML = '<div class="card"><h1>YouTube 📺</h1><p>Powiedz "otwórz youtube"</p></div>';
            if(p==='spotify') m.innerHTML = '<div class="card"><h1>Spotify 🎵</h1><p>Muzyka już czeka.</p></div>';
        }

        // --- OBSŁUGA GŁOSU ---
        const btn = document.getElementById('go-mic');
        const st = document.getElementById('status');
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!Speech) {
            alert("Twoja przeglądarka nie wspiera mikrofonu. Użyj Chrome na Androidzie.");
        } else {
            const rec = new Speech();
            rec.lang = 'pl-PL';

            btn.onclick = () => {
                try {
                    rec.start();
                    st.style.display = "block";
                    st.innerText = "Słucham...";
                } catch(e) { alert("Błąd startu: " + e.message); }
            };

            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                st.innerText = "Powiedziałeś: " + cmd;

                // Logika otwierania apek (INTENTY ANDROID)
                if (cmd.includes("brawl stars")) {
                    window.location.href = "intent://#Intent;scheme=android-app;package=com.supercell.brawlstars;end";
                } 
                else if (cmd.includes("youtube") || cmd.includes("jutiub")) {
                    window.location.href = "intent://#Intent;scheme=android-app;package=com.google.android.youtube;end";
                }
                else if (cmd.includes("tiktok") || cmd.includes("tiktoka")) {
                    window.location.href = "intent://#Intent;scheme=android-app;package=com.zhiliaoapp.musically;end";
                }
                
                setTimeout(() => { st.style.display = "none"; }, 3000);
            };

            rec.onerror = (e) => {
                st.innerText = "Błąd: " + e.error;
                if(e.error === 'not-allowed') alert("Musisz zezwolić na mikrofon w ustawieniach przeglądarki!");
                setTimeout(() => { st.style.display = "none"; }, 3000);
            };
        }
    </script>
</body>
</html>
